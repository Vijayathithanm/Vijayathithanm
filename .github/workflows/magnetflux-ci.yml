name: MagnetFlux Studio CI

on:
  push:
    paths:
      - "MagnetFluxStudio/**"
      - ".github/workflows/magnetflux-ci.yml"
  pull_request:
    paths:
      - "MagnetFluxStudio/**"
      - ".github/workflows/magnetflux-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MagnetFluxStudio
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Gmsh system libraries
        run: sudo apt-get update && sudo apt-get install -y libglu1-mesa libxft2 libxcursor1 libxinerama1 libxrender1
      - name: Install core + dev + numerical extras
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest pytest-cov
          pip install scikit-fem matplotlib reportlab gmsh
      - name: Run test suite (numerical core, FEM, rendering, CAD import)
        run: pytest -q --cov=magnetflux --cov-report=term-missing
