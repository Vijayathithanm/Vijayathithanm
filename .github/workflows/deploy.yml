name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # User/org sites (repo named *.github.io) serve from the domain root;
      # project sites serve from /<repo>.
      - name: Compute base path
        id: bp
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo" == *.github.io ]]; then
            echo "base=" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$repo" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.bp.outputs.base }}

      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
