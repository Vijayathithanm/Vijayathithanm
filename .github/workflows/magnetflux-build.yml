name: MagnetFlux Studio Windows Build

# Builds the native Windows executable and installer, uploaded as downloadable
# artifacts. Runs on demand, on pushes touching the packaging, and on release
# tags (which additionally attach the installer to a GitHub Release).
on:
  workflow_dispatch:
  push:
    tags:
      - "magnetflux-v*"
    branches:
      - main
    paths:
      - "MagnetFluxStudio/**"
      - ".github/workflows/magnetflux-build.yml"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: MagnetFluxStudio
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .[gui,fem,report,cad]
          pip install pyinstaller

      - name: Build executable (PyInstaller)
        run: pyinstaller packaging/magnetflux.spec

      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup -y --no-progress
          iscc packaging/installer.iss

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: MagnetFluxStudio-portable
          path: MagnetFluxStudio/dist/MagnetFluxStudio/

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: MagnetFluxStudio-installer
          path: MagnetFluxStudio/dist/MagnetFluxStudio-*-setup.exe

      - name: Attach installer to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MagnetFluxStudio/dist/MagnetFluxStudio-*-setup.exe
